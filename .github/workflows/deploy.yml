name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci

      - name: Build SPA
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}

      - name: Deploy CDK
        run: npm run deploy

      - name: Upload site to S3
        run: aws s3 sync ./dist s3://$(aws cloudformation describe-stacks --stack-name FirstLight --query "Stacks[0].Outputs[?OutputKey=='BucketName'].OutputValue" --output text) --delete --cache-control "public, max-age=31536000, immutable"
